[Unit]
# docker-ce already orders After=network-online.target, but on this host
# ifupdown reaches that target as soon as dhcpcd is *launched* -- dhcpcd then
# writes /etc/resolv.conf a few seconds later, asynchronously. Any container
# with a restart policy that comes up in that window inherits an empty resolver
# ("NO EXTERNAL NAMESERVERS DEFINED") and can never resolve anything until it is
# recreated. Also order after the macvlan shim so the host route to the
# Technitium resolver (on a macvlan network) exists before containers forward
# their upstream DNS through the host.
After=macvlan-shim.service
Wants=macvlan-shim.service

[Service]
# Hold dockerd startup until /etc/resolv.conf has a non-loopback nameserver, so
# every container Docker subsequently creates inherits a working upstream. `$$`
# is systemd's escape for a literal `$`, so bash receives `$(seq 30)` / `$i`.
# Bounded to ~30s; on timeout we start anyway rather than wedge the boot.
ExecStartPre=/usr/bin/bash -c 'for i in $$(seq 30); do grep -E "^nameserver [0-9]" /etc/resolv.conf | grep -qv "^nameserver 127" && exit 0; sleep 1; done; echo "docker: no usable nameserver in /etc/resolv.conf after 30s; starting anyway" >&2; exit 0'
